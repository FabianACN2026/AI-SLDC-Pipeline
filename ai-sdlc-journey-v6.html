<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI-Native SDLC Journey — Accenture</title>
<style>
/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:Arial,Helvetica,sans-serif;background:#08080f;color:#111;overflow:hidden;display:flex;flex-direction:column}

/* ─── TOKENS ─── */
:root{
  /* brand */
  --p:#A100FF; --pd:#7B00BF; --pdd:#460073;
  --p8:rgba(161,0,255,.08); --p15:rgba(161,0,255,.15);
  --p20:rgba(161,0,255,.20);
  /* surface */
  --s0:#fff; --s1:#FAFAFA; --s2:#F5F5F5; --s3:#EFEFEF;
  /* border */
  --b0:rgba(0,0,0,.06); --b1:rgba(0,0,0,.10);
  /* text */
  --t0:#0d0d0d; --t1:#3a3a3a; --t2:#6a6a7a; --t3:#a0a0b0;
  /* status */
  --g:#00875A; --g8:rgba(0,135,90,.08); --gb:rgba(0,135,90,.16);
  --a:#905000; --a8:rgba(144,80,0,.07); --ab:rgba(144,80,0,.16);
  --r:#c00030; --r8:rgba(192,0,48,.06); --rb:rgba(192,0,48,.14);
  --bl:#0052CC; --bl8:rgba(0,82,204,.07); --blb:rgba(0,82,204,.15);
  --tl:#007070; --tl8:rgba(0,112,112,.07);
  /* radius */
  --r4:4px; --r6:6px; --r8:8px; --r10:10px; --r12:12px;
  /* shadow */
  --sh1:0 1px 4px rgba(0,0,0,.07);
  --sh2:0 2px 10px rgba(0,0,0,.09),0 1px 3px rgba(0,0,0,.05);
}

/* ─── TOPBAR ─── */
.bar{
  height:42px;flex-shrink:0;
  background:rgba(8,8,15,.97);
  border-bottom:1px solid rgba(255,255,255,.055);
  display:flex;align-items:center;padding:0 18px;gap:0;
}
.bar-brand{display:flex;align-items:center;gap:9px;padding-right:14px;border-right:1px solid rgba(255,255,255,.07)}
.bar-name{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.82);letter-spacing:.04em;text-transform:uppercase}
.bar-sub{font-size:9.5px;color:var(--p);font-weight:600;margin-left:12px}
.bar-sep{width:1px;height:18px;background:rgba(255,255,255,.07);margin:0 6px;flex-shrink:0}

/* ─── STEP NAV ─── */
.nav{display:flex;align-items:center;flex:1;padding:0 6px;gap:1px}
.nb{
  display:flex;align-items:center;gap:5px;
  padding:4px 8px;border-radius:var(--r6);
  border:none;background:transparent;cursor:default;
  color:rgba(255,255,255,.22);font-family:Arial,Helvetica,sans-serif;
  transition:background .13s,color .13s;
}
.nb.vis{cursor:pointer;color:rgba(255,255,255,.48)}
.nb.vis:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
.nb.cur{background:rgba(161,0,255,.16);color:#fff;cursor:default}
.nd{
  width:15px;height:15px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:7.5px;font-weight:700;flex-shrink:0;
  background:rgba(255,255,255,.05);color:rgba(255,255,255,.28);
}
.nb.vis .nd{background:rgba(161,0,255,.22);color:var(--p)}
.nb.cur .nd{background:var(--p);color:#fff}
.nl{font-size:9px;font-weight:600;white-space:nowrap;letter-spacing:.02em}
.nsep{color:rgba(255,255,255,.1);font-size:9px;padding:0 1px;flex-shrink:0}
.bar-meta{font-size:8.5px;color:rgba(255,255,255,.18);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}

/* ─── PROGRESS ─── */
.prog{height:1.5px;flex-shrink:0;background:rgba(255,255,255,.04)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--p),#b840ff);transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ─── STAGE / PANEL ─── */
.stage{flex:1;min-height:0;position:relative;background:var(--s1)}
.panel{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .18s;
}
.panel.on{opacity:1;pointer-events:all}

/* ─── STEP CHROME ─── */
.sh{                          /* step header */
  padding:12px 22px 10px;
  background:var(--s0);
  border-bottom:1px solid var(--b0);
  flex-shrink:0;
}
.sh-eye{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.22em;color:var(--p);margin-bottom:3px}
.sh-ttl{font-family:'Arial Black',Arial,sans-serif;font-size:14.5px;font-weight:900;color:var(--t0);line-height:1.28;margin-bottom:2px}
.sh-ttl em{font-style:normal;color:var(--p)}
.sh-sub{font-size:9.5px;color:var(--t2);line-height:1.5;max-width:940px}
.sb{                          /* step body */
  flex:1;min-height:0;
  padding:12px 16px 12px;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sf{                          /* step footer */
  height:44px;padding:0 22px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--s0);
  border-top:1px solid var(--b0);
  flex-shrink:0;
}

/* ─── GRID ─── */
/* .grid is the full-height grid that fills .sb */
.sb > .grid{
  flex:1;min-height:0;
  display:grid;
  grid-template-rows:1fr;   /* single row → fills available height */
  align-items:stretch;
  gap:12px;
}
.grid.c2  {grid-template-columns:1fr 1fr}
.grid.c3  {grid-template-columns:1fr 1fr 1fr}
.grid.c53 {grid-template-columns:5fr 3fr}
.grid.c121{grid-template-columns:1fr 2fr 1fr}
.grid.c23 {grid-template-columns:2fr 3fr}
/* inner grids (not direct children of .sb) */
.igrid{display:grid;align-items:stretch;gap:8px}
.igrid.c2{grid-template-columns:1fr 1fr}
.igrid.c3{grid-template-columns:1fr 1fr 1fr}

/* ─── COLUMN ─── */
/* Direct child of a grid cell. Fills the cell. */
.col{display:flex;flex-direction:column;gap:8px;height:100%;overflow:hidden}
.col.scroll{overflow-y:auto;overflow-x:hidden}
/* spacer that fills remaining space */
.grow{flex:1;min-height:0}
/* grow + scrollable */
.grow.scroll{overflow-y:auto;overflow-x:hidden;padding-right:1px}

/* ─── CARD ─── */
.card{background:var(--s0);border:1px solid var(--b0);border-radius:var(--r8);padding:12px}
.card.p16{padding:16px}
.card.sm{padding:8px 10px}
.card.ghost{background:transparent;border-color:transparent;padding:0}
/* colour variants */
.cv-pur{background:linear-gradient(135deg,rgba(161,0,255,.05),rgba(161,0,255,.02));border:1px solid var(--p15);border-radius:var(--r8);padding:12px}
.cv-grn{background:var(--g8);border:1px solid var(--gb);border-radius:var(--r8);padding:12px}
.cv-amb{background:var(--a8);border:1px solid var(--ab);border-radius:var(--r8);padding:12px}
.cv-red{background:var(--r8);border:1px solid var(--rb);border-radius:var(--r8);padding:12px}
.cv-blu{background:var(--bl8);border:1px solid var(--blb);border-radius:var(--r8);padding:12px}
.cv-dk {background:rgba(8,5,18,.97);border:1px solid rgba(161,0,255,.14);border-radius:var(--r8);padding:12px}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:6px 14px;border-radius:var(--r6);
  font-family:Arial,Helvetica,sans-serif;
  font-size:9.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;
  border:none;cursor:pointer;transition:all .14s;
  white-space:nowrap;flex-shrink:0;
}
.btn-p{background:var(--p);color:#fff}
.btn-p:hover{background:var(--pd);transform:translateY(-1px);box-shadow:0 3px 12px rgba(161,0,255,.28)}
.btn-p:disabled{background:rgba(161,0,255,.28);cursor:not-allowed;transform:none;box-shadow:none}
.btn-g{background:transparent;color:var(--pd);border:1px solid var(--p20)}
.btn-g:hover{background:var(--p8)}
.btn-dim{color:var(--t2);border:1px solid var(--b1);pointer-events:none;background:transparent}

/* ─── LABEL ─── */
.lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--p);flex-shrink:0}
.lbl.muted{color:var(--t2)}
.lbl.amber{color:var(--a)}
.lbl.green{color:var(--g)}

/* ─── TAGS ─── */
.tag{
  display:inline-flex;align-items:center;
  padding:2px 6px;border-radius:3px;border:1px solid;
  font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  flex-shrink:0;
}
.tg-p{color:var(--pd);background:var(--p8);border-color:var(--p15)}
.tg-g{color:var(--g);background:var(--g8);border-color:var(--gb)}
.tg-a{color:var(--a);background:var(--a8);border-color:var(--ab)}
.tg-r{color:var(--r);background:var(--r8);border-color:var(--rb)}
.tg-b{color:var(--bl);background:var(--bl8);border-color:var(--blb)}
.tg-t{color:var(--tl);background:var(--tl8);border-color:rgba(0,112,112,.16)}
.tg-n{color:var(--t2);background:var(--s2);border-color:var(--b0)}

/* ─── STATUS ROWS ─── */
.srow{display:flex;align-items:flex-start;gap:8px;padding:7px 9px;border-radius:var(--r6);border:1px solid;margin-bottom:5px;flex-shrink:0}
.srow-ico{width:14px;flex-shrink:0;margin-top:1px;text-align:center;font-size:10px}
.srow-lbl{font-size:9.5px;font-weight:600;color:var(--t0)}
.srow-note{font-size:8.5px;color:var(--t2);margin-top:2px;line-height:1.4}
.srow.pass{background:var(--g8);border-color:var(--gb)}.srow.pass .srow-ico{color:var(--g)}
.srow.warn{background:var(--a8);border-color:var(--ab)}.srow.warn .srow-ico{color:var(--a)}
.srow.fail{background:var(--r8);border-color:var(--rb)}.srow.fail .srow-ico{color:var(--r)}

/* ─── CODE ─── */
.codebar{
  display:flex;align-items:center;gap:5px;
  padding:6px 11px;
  background:rgba(6,4,16,.99);
  border-radius:var(--r8) var(--r8) 0 0;
  border:1px solid rgba(161,0,255,.12);
  border-bottom:1px solid rgba(255,255,255,.04);
  flex-shrink:0;
}
.code{
  background:rgba(7,5,16,.97);
  border:1px solid rgba(161,0,255,.12);
  border-top:none;
  border-radius:0 0 var(--r8) var(--r8);
  padding:10px 12px;
  font-family:Menlo,Monaco,Consolas,monospace;
  font-size:9px;color:#cfc6ea;line-height:1.65;
  overflow:auto;
}
.code.standalone{border-radius:var(--r8);border-top:1px solid rgba(161,0,255,.12)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
.clbl{font-size:8.5px;color:rgba(255,255,255,.25);font-family:Menlo,Monaco,monospace;margin-left:5px}

/* ─── TOOL ROWS ─── */
.trow{
  display:flex;align-items:flex-start;gap:9px;
  padding:8px 10px;border-radius:var(--r6);
  background:var(--s0);border:1px solid var(--b0);
  margin-bottom:5px;flex-shrink:0;transition:border-color .2s;
}
.trow.done{border-color:rgba(0,135,90,.13)}
.trow-ico{width:16px;height:16px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.sp{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(161,0,255,.15);border-top-color:var(--p);animation:spin .75s linear infinite}
.chk{width:14px;height:14px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center}
.idl{width:14px;height:14px;border-radius:50%;border:1px solid var(--b1);background:var(--s2)}
.trow-body{flex:1;min-width:0}
.trow-tool{font-size:9px;font-family:Menlo,Monaco,monospace;font-weight:600;color:var(--t0);margin-bottom:2px}
.trow-arg {font-size:8px;font-family:Menlo,Monaco,monospace;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow-res {font-size:8px;font-family:Menlo,Monaco,monospace;color:var(--g);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ─── SELECTOR BTNS (layers / spec / gates / faults) ─── */
.selb{
  width:100%;text-align:left;padding:9px 10px;border-radius:var(--r6);
  border:1px solid transparent;background:transparent;cursor:pointer;
  transition:all .13s;font-family:Arial,Helvetica,sans-serif;display:block;
  flex-shrink:0;
}
.selb:hover{background:var(--s2);border-color:var(--b0)}
.selb.on{background:var(--s0);border-color:var(--p15);box-shadow:var(--sh1)}

/* ─── AGENT CARD ─── */
.agc{
  padding:10px 11px;border-radius:var(--r6);
  background:var(--s0);border:1px solid var(--b0);
  cursor:pointer;transition:all .13s;flex-shrink:0;
}
.agc:hover{border-color:var(--b1);box-shadow:var(--sh1)}
.agc.on{border-color:var(--p15);box-shadow:var(--sh1)}
.pbar{height:2.5px;background:var(--s2);border-radius:2px;overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;border-radius:2px;transition:width .18s ease}

/* ─── GATE BTN ─── */
.gateb{
  width:100%;text-align:left;padding:10px 11px;border-radius:var(--r6);
  border:1px solid var(--b0);background:var(--s0);cursor:pointer;
  transition:all .13s;font-family:Arial,Helvetica,sans-serif;flex-shrink:0;
}
.gateb:hover{box-shadow:var(--sh1)}
.gateb.on{border-color:var(--p15);box-shadow:var(--sh1)}
.gateb.done{border-color:var(--gb);background:var(--g8)}

/* ─── JIRA ─── */
.jira-bar{background:#0052CC;border-radius:var(--r8) var(--r8) 0 0;padding:7px 13px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.jira-body{background:var(--s0);border:1px solid rgba(0,82,204,.1);border-top:none;border-radius:0 0 var(--r8) var(--r8);padding:13px;flex:1;overflow-y:auto}
.acr{display:flex;gap:7px;align-items:flex-start;padding:6px 9px;border-radius:var(--r4);border:1px solid;margin-bottom:4px}
.acr.ok{background:var(--g8);border-color:var(--gb)}
.acr.warn{background:var(--a8);border-color:var(--ab)}
.acid{font-size:8.5px;font-weight:700;flex-shrink:0;width:28px}
.actx{font-size:9.5px;color:var(--t1);line-height:1.4;flex:1}

/* ─── CONFLUENCE ─── */
.ch1{font-size:13px;font-weight:700;color:var(--t0);margin-bottom:7px}
.ch2{font-size:10.5px;font-weight:700;color:var(--t0);margin:10px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--b0)}
.cp{font-size:9.5px;color:var(--t1);line-height:1.6;margin-bottom:7px}
.ctbl{width:100%;border-collapse:collapse;font-size:9px;margin-bottom:10px}
.ctbl th{background:var(--s2);padding:5px 9px;text-align:left;font-weight:700;color:var(--t2);font-size:8px;text-transform:uppercase;letter-spacing:.05em;border:1px solid var(--b0)}
.ctbl td{padding:5px 9px;border:1px solid var(--b0);color:var(--t1);line-height:1.4}
.ctbl td:first-child{font-weight:600;color:var(--t0)}
.cbadge{display:inline-flex;padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700}
.cg{background:var(--g8);color:var(--g);border:1px solid var(--gb)}
.cb{background:var(--bl8);color:var(--bl);border:1px solid var(--blb)}
.cv{background:var(--p8);color:var(--pd);border:1px solid var(--p15)}
.cinfo{background:var(--bl8);border-left:2.5px solid var(--bl);border-radius:0 var(--r4) var(--r4) 0;padding:7px 11px;margin-bottom:9px;font-size:9.5px;color:var(--t1)}
.csucc{background:var(--g8);border-left:2.5px solid var(--g);border-radius:0 var(--r4) var(--r4) 0;padding:7px 11px;margin-bottom:9px;font-size:9.5px;color:var(--t1)}

/* ─── SUCCESS ─── */
.dstep{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:var(--r4);background:var(--g8);border:1px solid var(--gb);flex-shrink:0}
.big-n{font-size:26px;font-family:'Arial Black',Arial,sans-serif;font-weight:900;line-height:1}

/* ─── MISC ─── */
.divider{height:1px;background:var(--b0);flex-shrink:0}
.blink::after{content:'|';color:var(--p);animation:blink 1s step-end infinite}

/* ─── TYPOGRAPHY ─── */
.t0{color:var(--t0)}.t1{color:var(--t1)}.t2{color:var(--t2)}.t3{color:var(--t3)}
.tp{color:var(--p)}.tpd{color:var(--pd)}.tg{color:var(--g)}.ta{color:var(--a)}.tr{color:var(--r)}.tb{color:var(--bl)}
.f7{font-size:7px}.f8{font-size:8px}.f9{font-size:9px}.f10{font-size:10px}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}
.bold{font-weight:700}.bolder{font-family:'Arial Black',Arial,sans-serif;font-weight:900}
.upper{text-transform:uppercase;letter-spacing:.08em}
.mono{font-family:Menlo,Monaco,Consolas,monospace}

/* ─── SPACING ─── */
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}
.mta{margin-top:auto}

/* ─── FLEX HELPERS ─── */
.row{display:flex;align-items:center}
.row.top{align-items:flex-start}
.row.wrap{flex-wrap:wrap}
.ml{margin-left:auto}
.w100{width:100%}
.sh0{flex-shrink:0}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.au{animation:fadeUp .3s ease forwards}
.ai{animation:fadeIn .22s ease forwards}
.as{animation:slideIn .28s ease forwards}
.d1{animation-delay:.07s;opacity:0}.d2{animation-delay:.14s;opacity:0}
.d3{animation-delay:.21s;opacity:0}.d4{animation-delay:.28s;opacity:0}
.d5{animation-delay:.35s;opacity:0}.d6{animation-delay:.42s;opacity:0}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(161,0,255,.18);border-radius:2px}
</style>
</head>
<body>

<div class="bar">
  <div class="bar-brand">
    <svg width="17" height="17" viewBox="0 0 32 32" fill="#A100FF"><path d="M0 22.6L17.66 16.03L0 9.13V0L30.24 12.18V19.75L0 32V22.6Z"/></svg>
    <span class="bar-name">AI-Augmented SDLC</span>
    <div style="width:1px;height:16px;background:rgba(255,255,255,.07);margin:0 8px"></div>
    <span class="bar-sub">AI-Native Story Journey</span>
  </div>
  <div class="nav" id="nav"></div>
  <span class="bar-meta">Apr 2026</span>
</div>

<div class="prog"><div class="prog-fill" id="pf" style="width:0%"></div></div>
<div class="stage" id="stage"></div>

<script>
/* ── ICONS ── */
const I = {
  chk:`<svg width="9" height="9" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5"/></svg>`,
  wrn:`<svg width="9" height="9" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M5.5 1L10.5 10H.5Z"/><line x1="5.5" y1="4.5" x2="5.5" y2="6.8"/><circle cx="5.5" cy="8.2" r=".6" fill="currentColor"/></svg>`,

/* ── STEPS ── */
const STEPS=[
  {id:'jira',   short:'Jira'},  {id:'mcp',       short:'MCP'},
  {id:'layers', short:'Layers'},{id:'spec',       short:'Spec'},
  {id:'build',  short:'Build'}, {id:'gates',      short:'Gates'},
  {id:'faults', short:'Faults'},{id:'confluence', short:'Docs'},
  {id:'done',   short:'Done'},
];

let cur='jira', vis=new Set(['jira']), ss={};

/* ── NAV ── */
function renderNav(){
  const idx=STEPS.findIndex(s=>s.id===cur);
  document.getElementById('nav').innerHTML=STEPS.map((s,i)=>{
    const active=s.id===cur, visited=vis.has(s.id), past=i<idx;
    const cls='nb'+(active?' cur':visited?' vis':'');
    const dot=past?`<span style="color:var(--p)">${I.chk}</span>`:(i+1);
    return `<button class="${cls}" onclick="vis.has('${s.id}')&&goTo('${s.id}')" >
      <span class="nd">${dot}</span>
      <span class="nl">${s.short}</span>
    </button>${i<STEPS.length-1?'<span class="nsep">›</span>':''}`;
  }).join('');
  document.getElementById('pf').style.width=(idx/(STEPS.length-1)*100)+'%';
}
function goTo(id){cur=id;vis.add(id);renderNav();render();}
function next(){const i=STEPS.findIndex(s=>s.id===cur);if(i<STEPS.length-1)goTo(STEPS[i+1].id);}
function prev(){const i=STEPS.findIndex(s=>s.id===cur);if(i>0)goTo(STEPS[i-1].id);}

/* ── FOOTER ── */
function foot(back,fwd,dis=false,isFirst=false,isLast=false){
  const L=isFirst?`<button class="btn btn-dim">${I.aL}</button>`:`<button class="btn btn-g" onclick="prev()">${I.aL}&nbsp;${back}</button>`;
  const R=isLast?`<button class="btn btn-p" onclick="goTo('jira')">↺&nbsp;New Story</button>`
    :`<button class="btn btn-p" onclick="${dis?'':' next()'}" ${dis?'disabled':''}>${fwd}&nbsp;${I.aR}</button>`;
  return `<div class="sf">${L}${R}</div>`;
}

window.mcpStart=()=>{
