<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-Native SDLC Journey — M&G Delivery Engine</title>
<style>
/* === RESET & BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:Arial,Helvetica,sans-serif;background:#0a0a10;height:100vh;overflow:hidden;display:flex;flex-direction:column;color:#1a1a1a}

/* === DESIGN TOKENS === */
:root{
  --acn:#A100FF;
  --acn-dk:#7B00BF;
  --acn-dp:#460073;
  --acn-lt:rgba(161,0,255,0.08);
  --acn-border:rgba(161,0,255,0.18);
  --surface:#ffffff;
  --surface-2:#FAFAFA;
  --surface-3:#F4F4F4;
  --border-subtle:rgba(0,0,0,0.07);
  --border:rgba(0,0,0,0.12);
  --text-primary:#0d0d0d;
  --text-secondary:#4a4a4a;
  --text-muted:#8a8a9a;
  --text-faint:#b8b8c8;
  --green:#00875A;
  --green-lt:rgba(0,135,90,0.08);
  --green-border:rgba(0,135,90,0.18);
  --amber:#a05000;
  --amber-lt:rgba(160,80,0,0.07);
  --amber-border:rgba(160,80,0,0.18);
  --red:#c80028;
  --red-lt:rgba(200,0,40,0.06);
  --red-border:rgba(200,0,40,0.16);
  --blue:#0052CC;
  --blue-lt:rgba(0,82,204,0.07);
  --blue-border:rgba(0,82,204,0.16);
  --teal:#007a70;
  --teal-lt:rgba(0,122,112,0.07);
  --radius-sm:6px;
  --radius:10px;
  --radius-lg:14px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 2px 8px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.10),0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12),0 4px 12px rgba(0,0,0,0.06);
}

/* === TOPBAR === */
.topbar{
  height:44px;
  background:rgba(10,10,16,0.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  padding:0 20px;
  gap:0;
  flex-shrink:0;
  z-index:100;
}
.topbar-brand{display:flex;align-items:center;gap:10px;padding-right:16px;border-right:1px solid rgba(255,255,255,0.08)}
.topbar-brand svg{flex-shrink:0}
.topbar-title{font-size:11px;font-weight:700;color:rgba(255,255,255,0.8);letter-spacing:0.04em;text-transform:uppercase}
.topbar-sub{font-size:10px;color:var(--acn);font-weight:600;letter-spacing:0.02em}
.topbar-sep{width:1px;height:20px;background:rgba(255,255,255,0.06);margin:0 16px}

/* === STEP NAV === */
.step-nav{display:flex;align-items:center;gap:2px;flex:1;padding:0 8px}
.step-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 9px;
  border-radius:var(--radius-sm);
  border:none;background:transparent;cursor:default;
  transition:all 0.15s;
  color:rgba(255,255,255,0.25);
  font-family:Arial,Helvetica,sans-serif;
}
.step-btn.visited{cursor:pointer;color:rgba(255,255,255,0.5)}
.step-btn.visited:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7)}
.step-btn.active{background:rgba(161,0,255,0.18);color:#fff;cursor:default}
.step-dot{
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;flex-shrink:0;
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.3);
}
.step-btn.visited .step-dot{background:rgba(161,0,255,0.25);color:var(--acn)}
.step-btn.active .step-dot{background:var(--acn);color:#fff}
.step-label{font-size:9.5px;font-weight:600;white-space:nowrap;letter-spacing:0.02em}
.step-check{font-size:8px;color:var(--acn)}

/* === PROGRESS BAR === */
.progress-track{height:2px;background:rgba(255,255,255,0.05);flex-shrink:0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acn),#c060ff);transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}

/* === STAGE === */
.stage{flex:1;overflow:hidden;position:relative;background:var(--surface-2)}
.step-panel{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity 0.2s;
}
.step-panel.active{opacity:1;pointer-events:all}

/* === STEP LAYOUT === */
.step-header{
  padding:13px 24px 11px;
  background:var(--surface);
  border-bottom:1px solid var(--border-subtle);
  flex-shrink:0;
}
.step-eyebrow{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.24em;color:var(--acn);margin-bottom:4px;
}
.step-title{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:15px;font-weight:900;color:var(--text-primary);
  line-height:1.3;margin-bottom:3px;
}
.step-title em{font-style:normal;color:var(--acn)}
.step-desc{font-size:10px;color:var(--text-secondary);line-height:1.5;max-width:920px}

/* step-body: flex column, fills space between header+footer */
.step-body{
  flex:1;min-height:0;
  padding:12px 18px 12px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
/* Direct grid child of step-body always fills all available height */
.step-body > .sg{flex:1;min-height:0;height:100%}

.step-footer{
  height:46px;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);
  border-top:1px solid var(--border-subtle);
  flex-shrink:0;
}

/* === BUTTONS === */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 16px;border-radius:var(--radius-sm);
  font-family:Arial,Helvetica,sans-serif;
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.1em;
  border:none;cursor:pointer;transition:all 0.15s;
  white-space:nowrap;flex-shrink:0;
}
.btn-primary{background:var(--acn);color:#fff}
.btn-primary:hover{background:var(--acn-dk);transform:translateY(-1px);box-shadow:0 4px 12px rgba(161,0,255,0.3)}
.btn-primary:disabled{background:rgba(161,0,255,0.3);cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:transparent;color:var(--acn-dk);border:1px solid var(--acn-border)}
.btn-ghost:hover{background:var(--acn-lt)}
.btn-ghost.dim{color:var(--text-muted);border-color:var(--border);pointer-events:none}

/* === CARDS ===
   .card = base white surface
   .card-p = standard 14px padding (add to .card)
   .card-sm = compact 10px/12px padding
   Color modifiers: .card-purple, .card-green, .card-amber, .card-red, .card-blue
   All modifiers include border-radius so they work standalone too.
*/
.card{
  background:var(--surface);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius);
}
.card-p{padding:14px}
.card-sm{padding:10px 12px}
.card-purple{
  background:linear-gradient(135deg,rgba(161,0,255,0.05),rgba(161,0,255,0.02));
  border:1px solid var(--acn-border);
  border-radius:var(--radius);
}
.card-green{background:var(--green-lt);border:1px solid var(--green-border);border-radius:var(--radius)}
.card-amber{background:var(--amber-lt);border:1px solid var(--amber-border);border-radius:var(--radius)}
.card-red{background:var(--red-lt);border:1px solid var(--red-border);border-radius:var(--radius)}
.card-blue{background:var(--blue-lt);border:1px solid var(--blue-border);border-radius:var(--radius)}
.card-dark{background:rgba(10,8,20,0.96);border:1px solid rgba(161,0,255,0.15);border-radius:var(--radius)}

/* === GRID LAYOUTS ===
   .sg = "step grid" — the master grid that fills step-body height
   All grids use align-items:stretch so all cells reach the same height.
*/
/* === GRID SYSTEM ===
   .sg is the step grid — direct child of .step-body.
   step-body is a flex-column, so .sg gets flex:1 (fills remaining height).
   Grid rows use grid-template-rows:1fr so the single row fills grid height.
   Grid cells then stretch to fill that row.
   Column wrappers (.col / .col-scroll) get overflow control inside cells.
*/
.step-body > .sg{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-rows:1fr;   /* single row fills all available height */
  align-items:stretch;
  gap:14px;
}
/* column-count variants */
.step-body > .sg.c2  {grid-template-columns:1fr 1fr}
.step-body > .sg.c3  {grid-template-columns:1fr 1fr 1fr}
.step-body > .sg.c53 {grid-template-columns:5fr 3fr}
.step-body > .sg.c32 {grid-template-columns:3fr 2fr}
.step-body > .sg.c23 {grid-template-columns:2fr 3fr}
.step-body > .sg.c121{grid-template-columns:1fr 2fr 1fr}
/* standalone .sg not inside step-body (e.g. nested grids) */
.sg{display:grid;align-items:stretch;gap:12px}
.sg.c2  {grid-template-columns:1fr 1fr}
.sg.c3  {grid-template-columns:1fr 1fr 1fr}

/* === COLUMN HELPERS ===
   Direct child of a grid cell.
   .col        = flex col, 10px gap, clips at cell boundary
   .col-scroll = flex col, scrolls content if taller than cell
   Both fill 100% of the grid cell height (grid gives them that).
*/
.col{
  display:flex;flex-direction:column;
  gap:10px;overflow:hidden;
  height:100%;  /* fill the grid cell */
}
.col-scroll{
  display:flex;flex-direction:column;
  gap:10px;overflow-y:auto;overflow-x:hidden;
  padding-right:2px;
  height:100%;  /* fill the grid cell */
}
/* flex-1 inside a col fills remaining space in that column */
.flex-1{flex:1;min-height:0;overflow:hidden}
/* flex-1 + scrollable */
.flex-1.scroll{overflow-y:auto;overflow-x:hidden;padding-right:2px}

/* === MISC LAYOUT === */
.h-full{height:100%}
.flex-col{display:flex;flex-direction:column}
.gap-2{gap:8px!important}
.gap-3{gap:10px!important}
.flex-1{flex:1;min-height:0}
.min-h-0{min-height:0}
.overflow-a{overflow-y:auto;padding-right:2px}
/* flex helpers used in JS templates */
.flex{display:flex}
.flex-wrap{flex-wrap:wrap}
.items-start{align-items:flex-start}
.items-center{align-items:center}
.items-end{align-items:flex-end}
.justify-between{justify-content:space-between}
.justify-center{justify-content:center}
.ml-auto{margin-left:auto}
.mt-auto{margin-top:auto}
.w-full{width:100%}
.shrink-0{flex-shrink:0}
.relative{position:relative}
/* gap helpers for flex rows */
.gap-1{gap:4px}.gap-2{gap:8px!important}.gap-3{gap:10px!important}.gap-4{gap:14px}
/* margin/padding shortcuts */
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.mb-0{margin-bottom:0}
.p-2{padding:8px}.p-3{padding:12px}
/* text */
.italic{font-style:italic}
.text-center{text-align:center}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* === LABEL === */
.label{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.2em;color:var(--acn);margin-bottom:6px;
  flex-shrink:0;
}
.label-muted{color:var(--text-muted)}

/* === TAGS === */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:4px;border:1px solid;
  font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;
}
.tag-purple{color:var(--acn-dk);background:rgba(161,0,255,0.07);border-color:var(--acn-border)}
.tag-blue{color:#004299;background:var(--blue-lt);border-color:var(--blue-border)}
.tag-green{color:var(--green);background:var(--green-lt);border-color:var(--green-border)}
.tag-amber{color:var(--amber);background:var(--amber-lt);border-color:var(--amber-border)}
.tag-red{color:var(--red);background:var(--red-lt);border-color:var(--red-border)}
.tag-teal{color:var(--teal);background:var(--teal-lt);border-color:rgba(0,122,112,0.18)}
.tag-gray{color:var(--text-muted);background:rgba(0,0,0,0.04);border-color:var(--border)}

/* === STATUS INDICATORS === */
.status-row{
  display:flex;align-items:flex-start;gap:8px;
  padding:8px 10px;border-radius:var(--radius-sm);
  border:1px solid;margin-bottom:6px;
}
.status-icon{font-size:11px;flex-shrink:0;margin-top:1px;width:14px;text-align:center}
.status-body{flex:1;min-width:0}
.status-label{font-size:10px;font-weight:600;color:var(--text-primary)}
.status-note{font-size:9px;color:var(--text-secondary);margin-top:2px;line-height:1.45}
.st-pass{background:var(--green-lt);border-color:var(--green-border)}
.st-pass .status-icon{color:var(--green)}
.st-warn{background:var(--amber-lt);border-color:var(--amber-border)}
.st-warn .status-icon{color:var(--amber)}
.st-fail{background:var(--red-lt);border-color:var(--red-border)}
.st-fail .status-icon{color:var(--red)}
.st-idle{background:var(--surface-3);border-color:var(--border)}
.st-idle .status-icon{color:var(--text-faint)}

/* === CODE BLOCK === */
.code-block{
  background:rgba(8,6,18,0.96);
  border:1px solid rgba(161,0,255,0.14);
  border-radius:var(--radius-sm);
  padding:12px 14px;
  font-family:Menlo,Monaco,Consolas,monospace;
  font-size:9.5px;color:#d8cff0;
  line-height:1.6;overflow:auto;
}
.code-topbar{
  display:flex;align-items:center;gap:5px;
  padding:6px 12px;
  background:rgba(8,6,18,0.98);
  border-radius:var(--radius-sm) var(--radius-sm) 0 0;
  border:1px solid rgba(161,0,255,0.14);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.code-topbar+.code-block{border-radius:0 0 var(--radius-sm) var(--radius-sm);border-top:none}
.dot-r{width:8px;height:8px;border-radius:50%;background:#ff5f57}
.dot-y{width:8px;height:8px;border-radius:50%;background:#febc2e}
.dot-g{width:8px;height:8px;border-radius:50%;background:#28c840}
.code-label{font-size:9px;color:rgba(255,255,255,0.3);font-family:Menlo,Monaco,monospace;margin-left:6px}

/* === TYPOGRAPHY UTILS === */
.t-primary{color:var(--text-primary)}
.t-secondary{color:var(--text-secondary)}
.t-muted{color:var(--text-muted)}
.t-faint{color:var(--text-faint)}
.t-acn{color:var(--acn)}
.t-acndk{color:var(--acn-dk)}
.t-green{color:var(--green)}
.t-amber{color:var(--amber)}
.t-red{color:var(--red)}
.t-blue{color:var(--blue)}
.fw-black{font-family:'Arial Black',Arial,sans-serif;font-weight:900}
.fw-bold{font-weight:700}
.fw-med{font-weight:600}
.fs-8{font-size:8px}
.fs-9{font-size:9px}
.fs-10{font-size:10px}
.fs-11{font-size:11px}
.fs-12{font-size:12px}
.fs-13{font-size:13px}
.upper{text-transform:uppercase;letter-spacing:0.1em}

/* === LAYOUT HELPERS === */
.flex{display:flex}
.items-center{align-items:center}
.items-start{align-items:flex-start}
.justify-between{justify-content:space-between}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:10px}.mt-4{margin-top:14px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:10px}.mb-4{margin-bottom:14px}
.ml-auto{margin-left:auto}
.w-full{width:100%}
.shrink-0{flex-shrink:0}
.relative{position:relative}

/* === ANIMATIONS === */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(161,0,255,0.15)}50%{box-shadow:0 0 0 6px rgba(161,0,255,0)}}

.anim-up{animation:fadeUp 0.35s ease forwards}
.anim-in{animation:fadeIn 0.25s ease forwards}
.anim-right{animation:slideRight 0.3s ease forwards}
.spin{animation:spin 0.8s linear infinite}
.blink::after{content:'|';color:var(--acn);animation:blink 1s step-end infinite}
.d1{animation-delay:0.08s;opacity:0}
.d2{animation-delay:0.16s;opacity:0}
.d3{animation-delay:0.24s;opacity:0}
.d4{animation-delay:0.32s;opacity:0}
.d5{animation-delay:0.40s;opacity:0}
.d6{animation-delay:0.48s;opacity:0}

/* === SECTION DIVIDER LINE === */
.rule{height:1px;background:var(--border-subtle);margin:10px 0}

/* === JIRA STEP === */
.jira-header-bar{
  background:#0052CC;border-radius:var(--radius) var(--radius) 0 0;
  padding:8px 14px;display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.jira-content{
  background:var(--surface);
  border:1px solid rgba(0,82,204,0.12);border-top:none;
  border-radius:0 0 var(--radius) var(--radius);
  padding:14px;
  flex:1;overflow-y:auto;
}
.ac-row{
  display:flex;gap:8px;align-items:flex-start;
  padding:7px 10px;border-radius:var(--radius-sm);border:1px solid;
  margin-bottom:5px;
  transition:all 0.2s;
}
.ac-row.ok{background:var(--green-lt);border-color:var(--green-border)}
.ac-row.warn{background:var(--amber-lt);border-color:var(--amber-border)}
.ac-id{font-size:9px;font-weight:700;flex-shrink:0;width:30px}
.ac-text{font-size:10px;color:var(--text-secondary);line-height:1.45;flex:1}

/* === MCP TOOL ROW === */
.tool-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 12px;
  border-radius:var(--radius-sm);
  background:var(--surface);
  border:1px solid var(--border-subtle);
  margin-bottom:5px;
  transition:all 0.25s;
}
.tool-row.done{border-color:rgba(0,135,90,0.14)}
.tool-status{width:18px;height:18px;flex-shrink:0;margin-top:1px}
.spinner-circle{width:16px;height:16px;border-radius:50%;border:2px solid rgba(161,0,255,0.15);border-top-color:var(--acn);animation:spin 0.8s linear infinite}
.check-circle{width:16px;height:16px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center}
.idle-circle{width:16px;height:16px;border-radius:50%;border:1px solid var(--border);background:var(--surface-3)}
.tool-body{flex:1;min-width:0}
.tool-name{font-size:9.5px;font-family:Menlo,Monaco,monospace;color:var(--text-primary);font-weight:600;margin-bottom:2px}
.tool-arg{font-size:8.5px;font-family:Menlo,Monaco,monospace;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool-result{font-size:8.5px;font-family:Menlo,Monaco,monospace;color:var(--green);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* === LAYER SELECTOR === */
.layer-btn{
  width:100%;text-align:left;padding:10px 12px;border-radius:var(--radius-sm);
  border:1px solid transparent;background:transparent;cursor:pointer;
  transition:all 0.15s;font-family:Arial,Helvetica,sans-serif;
  display:block;
}
.layer-btn:hover{background:var(--surface-3);border-color:var(--border)}
.layer-btn.active{background:var(--surface);border-color:var(--acn-border);box-shadow:var(--shadow-sm)}
.layer-icon-ring{
  width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.connector-line{width:2px;height:8px;margin:1px auto;border-radius:1px}

/* === SPEC EDITOR === */
.spec-line{
  padding:8px 12px;border-radius:var(--radius-sm);
  border-left:2.5px solid transparent;cursor:pointer;transition:all 0.15s;
}
.spec-line:hover{background:rgba(255,255,255,0.04)}
.spec-line.active{border-left-color:var(--acn)}
.spec-section-title{font-size:10px;font-family:Menlo,Monaco,monospace;font-weight:700;margin-bottom:4px}
.spec-body{font-size:9px;font-family:Menlo,Monaco,monospace;color:rgba(255,255,255,0.55);line-height:1.6;white-space:pre-wrap}
.spec-body.highlight{color:rgba(255,255,255,0.82)}

/* === AGENT CARDS === */
.agent-card{
  padding:12px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--border-subtle);
  cursor:pointer;transition:all 0.15s;
}
.agent-card:hover{border-color:var(--border);box-shadow:var(--shadow-sm)}

.conf-table th{background:var(--surface-3);padding:6px 10px;text-align:left;font-weight:700;color:var(--text-muted);font-size:8.5px;text-transform:uppercase;letter-spacing:0.06em;border:1px solid var(--border-subtle)}
.conf-table td{padding:6px 10px;border:1px solid var(--border-subtle);color:var(--text-secondary);line-height:1.4}
.conf-table td:first-child{font-weight:600;color:var(--text-primary)}
.conf-badge{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:8.5px;font-weight:700}
.cb-green{background:var(--green-lt);color:var(--green);border:1px solid var(--green-border)}
.cb-blue{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-border)}

.conf-info-box{background:var(--blue-lt);border-left:3px solid var(--blue);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:8px 12px;margin-bottom:10px;font-size:10px;color:var(--text-secondary)}
.conf-success-box{background:var(--green-lt);border-left:3px solid var(--green);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:8px 12px;margin-bottom:10px;font-size:10px;color:var(--text-secondary)}

/* === SUCCESS SCREEN === */
.metric-big{font-size:28px;font-family:'Arial Black',Arial,sans-serif;font-weight:900;line-height:1}
.deploy-step{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:var(--radius-sm);

/* === SCROLLBARS === */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(161,0,255,0.2);border-radius:2px}

/* Cards in flex columns should not shrink below content height */
.col > .card,
.col > .card-purple,
.col > .card-green,
.col > .card-amber,
.col > .card-red,
.col > .card-blue {
  flex-shrink:0;
}
/* Buttons in flex columns should not shrink */
.col > .btn { flex-shrink:0; }
/* Labels in flex columns should not shrink */
.col > .label { flex-shrink:0; }

/* flex-1 inside a col — take remaining space, clip overflow */
.col > .flex-1 { flex:1; min-height:0; overflow:hidden; }
.col > .flex-1.scroll { overflow-y:auto; overflow-x:hidden; padding-right:2px; }
/* col-scroll is itself the scrollable container — its children are normal flow */
.col-scroll > * { flex-shrink:0; }
</style>

<script>
/* =========================================================

const Icons = {

  test: `<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M5 1v5L2 12h10L9 6V1"/><line x1="4" y1="1" x2="10" y2="1"/></svg>`,
  docs: `<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="1" width="10" height="12" rx="1.5"/><line x1="4.5" y1="4.5" x2="9.5" y2="4.5"/><line x1="4.5" y1="7" x2="9.5" y2="7"/><line x1="4.5" y1="9.5" x2="7" y2="9.5"/></svg>`,
  lock: `<svg width="11" height="12" viewBox="0 0 12 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="2" y="6" width="8" height="7" rx="1.5"/><path d="M4 6V4a2 2 0 014 0v2"/><circle cx="6" cy="9.5" r="1" fill="currentColor" stroke="none"/></svg>`,
  rocket: `<svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M7 1c0 0 4 1 5 5-1 1-2 1-3 1L7 5c0-1 0-2 0-4z"/><path d="M9 7l-2 5-2-2 5-3z"/><path d="M4 9c-1 1-1 2-1 3 1 0 2 0 3-1"/></svg>`,

};

/* =========================================================
   STEP DEFINITIONS
   ========================================================= */
const STEPS = [
  { id:'jira',       label:'Story Validation',  short:'Jira'    },
  { id:'mcp',        label:'MCP Handoff',        short:'MCP'     },
  { id:'template',   label:'Context Layers',     short:'Layers'  },
  { id:'ticket',     label:'Spec Generation',    short:'Spec'    },
  { id:'build',      label:'Parallel Build',     short:'Build'   },
  { id:'gates',      label:'Human Gates',        short:'Gates'   },
  { id:'fault',      label:'Fault Paths',        short:'Faults'  },
  { id:'confluence', label:'Auto-Publish Docs',  short:'Docs'    },
  { id:'success',    label:'Deployed',           short:'Done'    },
];

/* =========================================================
   STATE
   ========================================================= */
let currentStep = 'jira';
let visitedSteps = new Set(['jira']);
const stepState = {}; // per-step reactive state

/* =========================================================
   NAV RENDER
   ========================================================= */
function renderNav() {
  const nav = document.getElementById('stepNav');
  const idx = STEPS.findIndex(s => s.id === currentStep);
  nav.innerHTML = STEPS.map((s, i) => {
    const active = s.id === currentStep;
    const visited = visitedSteps.has(s.id);
    const past = i < idx;
    let cls = 'step-btn';
    if (active) cls += ' active';
    else if (visited) cls += ' visited';
    const numOrCheck = past
      ? `<span style="color:var(--acn)">${Icons.check}</span>`
      : (i + 1);
    return `<button class="${cls}" onclick="visitedSteps.has('${s.id}') ? goTo('${s.id}') : null" data-id="${s.id}">
      <span class="step-dot">${numOrCheck}</span>
      <span class="step-label">${s.short}</span>
    </button>`;
  }).join(`<span style="color:rgba(255,255,255,0.1);font-size:10px;padding:0 1px">›</span>`);

  // progress
  const fill = (idx / (STEPS.length - 1)) * 100;
  document.getElementById('progressFill').style.width = fill + '%';
}

function goTo(id) {
  currentStep = id;
  visitedSteps.add(id);
  renderNav();
  renderStage();
}
function next() {
  const idx = STEPS.findIndex(s => s.id === currentStep);
  if (idx < STEPS.length - 1) goTo(STEPS[idx + 1].id);
}
function prev() {
  const idx = STEPS.findIndex(s => s.id === currentStep);
  if (idx > 0) goTo(STEPS[idx - 1].id);
}

/* =========================================================
   STEP FOOTER TEMPLATE
   ========================================================= */
function footer(prevLabel = '← Back', nextLabel = 'Continue', nextDisabled = false, isFirst = false, isLast = false) {
  const prevBtn = isFirst
    ? `<button class="btn btn-ghost dim">${Icons.arrow_left} &nbsp;</button>`
    : `<button class="btn btn-ghost" onclick="prev()">${Icons.arrow_left} ${prevLabel}</button>`;
  const nextBtn = isLast
    ? `<button class="btn btn-primary" onclick="goTo('jira')">↺ &nbsp;Run Another Story</button>`
    : `<button class="btn btn-primary" onclick="${nextDisabled ? '' : 'next()'}" ${nextDisabled ? 'disabled' : ''}>${nextLabel} &nbsp;${Icons.arrow_right}</button>`;
  return `<div class="step-footer">${prevBtn}${nextBtn}</div>`;
}

/* =========================================================
   STEP 1 — JIRA STORY VALIDATION
   ========================================================= */
function renderJira() {
  if (!stepState.jira) stepState.jira = { phase: 'idle', fixes: new Set(), flagFixed: false };
  const s = stepState.jira;

  const acs = [
    { id:'AC-1', text:'Given Case Priority = High → assigned to Complaints_L2 queue', ok: true },
    { id:'AC-2', text:'Given Case Priority = Critical → Complaints_Escalation within 30s', ok: true },
    { id:'AC-3', text:'Given bulk insert 200 Cases → all allocated within governor limits', ok: true },
    { id:'AC-4', text: s.flagFixed
        ? 'Given Priority changes to Critical → re-assigns automatically · Bulk 200 within limits'
        : 'Given existing Case Priority changes to Critical → re-assigns automatically',
      ok: s.flagFixed, warn: !s.flagFixed },
  ];

  const issues = [
    { idx:0, label:'AC-4 missing governor limit NFR', fix:'Added: "Bulk 200 re-assignments within governor limits" to AC-4' },
    { idx:1, label:'FLS requirements not specified', fix:'Added to Tech Notes: isAccessible() on Case.Priority, isUpdateable() on OwnerId' },
  ];

  const allFixed = s.fixes.size >= issues.length;
  const approved = s.phase === 'approved';

  let rhs = '';
  if (s.phase === 'idle') {
    rhs = `<div class="card card-p anim-in">
      <div class="flex items-center gap-2 mb-3">
        <div style="width:28px;height:28px;border-radius:7px;background:#0052CC;display:flex;align-items:center;justify-content:center;">${Icons.jira}</div>
        <div>
          <div class="fw-black fs-11 t-primary">Rovo Work Readiness Checker</div>
          <div class="fs-9 t-muted">Validates story before AI pipeline entry</div>
        </div>
      </div>
      <button class="btn btn-primary w-full" style="justify-content:center" onclick="rovoCheck()">
        ${Icons.zap} &nbsp;Run Readiness Check
      </button>
    </div>`;
  } else if (s.phase === 'checking') {
    rhs = `<div class="card card-p anim-in">
      <div class="label">Rovo is analysing…</div>
      ${['Parsing story structure…','Checking AC completeness…','Validating NFR coverage…','Cross-referencing domain model…'].map((t,i) => `
        <div class="flex items-center gap-2 fs-10 t-muted mb-2 anim-up d${i+1}">
          <div class="spinner-circle" style="width:12px;height:12px;border-width:1.5px"></div>${t}
        </div>`).join('')}
    </div>`;
  } else if ((s.phase === 'issues' || s.phase === 'fixing') && !allFixed) {
    rhs = `
    <div class="card card-p anim-in mb-2" style="border-color:var(--amber-border)">
      <div class="flex items-center gap-2 mb-2">
        <div style="color:var(--amber)">${Icons.warn}</div>
        <div class="fw-black fs-11" style="color:var(--amber)">${issues.length - s.fixes.size} issue${issues.length - s.fixes.size > 1 ? 's' : ''} to resolve</div>
      </div>
      <div class="fs-9 t-muted mb-3">Rovo has drafted fixes. Reviewer accepts each update — story updates automatically.</div>
      ${issues.map((issue, i) => s.fixes.has(i) ? '' : `
        <div class="mb-3 card-p" style="background:var(--amber-lt);border:1px solid var(--amber-border);border-radius:var(--radius-sm)">
          <div class="fw-bold fs-10" style="color:var(--amber);margin-bottom:4px">${Icons.warn} ${issue.label}</div>
          <div class="fs-9 t-muted mb-2">Rovo suggests: <em class="t-secondary">"${issue.fix}"</em></div>
          ${s.accepting === i
            ? `<div class="flex items-center gap-2 fs-9 t-muted"><div class="spinner-circle" style="width:12px;height:12px;border-width:1.5px"></div>Updating story…</div>`
            : `<button class="btn btn-ghost fs-9" style="padding:5px 10px" onclick="acceptFix(${i})">Accept &amp; update story</button>`
          }
        </div>`).join('')}
    </div>
    <div class="card card-p anim-in" style="border-color:var(--green-border)">
      ${issues.map((issue, i) => s.fixes.has(i)
        ? `<div class="flex items-center gap-2 mb-1 fs-10 t-green"><div style="color:var(--green)">${Icons.check}</div>${issue.label} — fixed</div>`
        : '').join('')}
    </div>`;
  } else if (approved) {
    rhs = `
    <div class="card card-p card-green anim-in mb-2">
      <div class="flex items-center gap-2 mb-1">
        <div style="color:var(--green)">${Icons.check}</div>
        <div class="fw-black fs-11 t-green">COMP-042 approved for AI pipeline</div>
      </div>
      <div class="fs-9 t-secondary">All 4 ACs validated · FLS specified · Governor limits NFR included</div>
    </div>
    <div class="card card-p card-purple anim-in">
      <div class="label">What happens next</div>
      <div class="fs-10 t-secondary" style="line-height:1.55">Developer opens Claude Code and references <strong>COMP-042</strong>. Architecture Agent reads the validated story live via Jira MCP — no copy-paste, no ambiguity.</div>
      <div class="flex items-center gap-2 mt-3">
        <div style="width:6px;height:6px;border-radius:50%;background:var(--acn)"></div>
        <div class="fs-9 t-acndk fw-bold">Next: Developer prompt → MCP reads Jira</div>
      </div>
    </div>`;
  } else if (allFixed && !approved) {
    rhs = `<div class="card card-p anim-in">
      <div class="label label-muted">All fixes accepted</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${[['✓ Story structure complete','As a / I want / So that ✓','pass'],
           ['✓ AC-1 to AC-3 format','Given/When/Then ✓','pass'],
           ['✓ Objects referenced','Case, Queue, SLA_Milestone__c','pass'],
           ['✓ AC-4 governor NFR','Added — Bulk 200 within limits','pass'],
           ['✓ FLS specified','isAccessible() + isUpdateable() added','pass']
          ].map(([l,n,st]) => `<div class="status-row st-${st}">
            <div class="status-icon">${Icons.check}</div>
            <div class="status-body"><div class="status-label">${l}</div><div class="status-note">${n}</div></div>
          </div>`).join('')}
      </div>
      <button class="btn btn-primary w-full mt-3" style="justify-content:center" onclick="approveStory()">Architect approves COMP-042 ${Icons.check}</button>
    </div>`;
  }

  return `
  <div class="step-panel active" id="panel-jira">
    <div class="step-header">
      <div class="step-eyebrow">Step 1 of 9 — Story Readiness</div>
      <div class="step-title">The journey starts in <em>Jira</em> — Rovo validates before AI touches it</div>
      <div class="step-desc">BA writes the story. Rovo's Work Readiness Checker flags gaps inline. Issues are fixed before anything enters the AI pipeline.</div>
    </div>
    <div class="step-body">
      <div class="sg c53">
        <!-- LEFT: Jira ticket -->
        <div class="col" style="gap:0">
          <div class="jira-header-bar">
            ${Icons.jira}
            <span class="fw-black fs-11" style="color:white">COMP-042</span>
            <span style="color:rgba(255,255,255,0.4)">·</span>
            <span style="font-size:10px;color:rgba(255,255,255,0.6)">Complaints · Sprint 4</span>
            <div class="ml-auto flex gap-2">
              <span class="tag" style="background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7)">Story</span>
              <span class="tag" style="background:rgba(255,153,0,0.7);border-color:transparent;color:white">In Refinement</span>
            </div>
          </div>
          <div class="jira-content">
            <div class="fw-black fs-13 t-primary mb-2" style="line-height:1.3">Auto-allocate Complaints cases by urgency + SLA tier</div>
            <div class="flex gap-2 mb-3 flex-wrap">
              <span class="tag tag-blue">Feature</span>
              <span class="tag tag-purple">Complaints · R1</span>
              <span class="tag tag-amber">High Priority</span>
              <span class="tag tag-gray">8 pts</span>
            </div>
            <div class="label label-muted">Description</div>
            <div class="fs-10 t-secondary mb-3" style="line-height:1.6">As a <strong>Complaints Triage Manager</strong>, I want new Case records automatically routed to the correct queue by urgency and SLA tier, so high-priority complaints reach the right team without manual intervention — within a 30-second SLA.</div>
            <div class="label label-muted">Acceptance Criteria</div>
            ${acs.map(ac => `
              <div class="ac-row ${ac.ok ? 'ok' : 'warn'}">
                <span class="ac-id ${ac.ok ? 't-green' : ''}" style="${!ac.ok ? 'color:var(--amber)' : ''}">${ac.id}</span>
                <span class="ac-text">${ac.text}</span>
                ${ac.warn ? `<span class="tag tag-amber">⚠ Needs NFR</span>` : ''}
                ${ac.ok && ac.id === 'AC-4' && s.flagFixed ? `<span class="tag tag-green">Fixed</span>` : ''}
